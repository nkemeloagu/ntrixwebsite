    <!-- Favicon: Simple classy NT monogram -->
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSIzMiIgdmlld0JveD0iMCAwIDMyIDMyIj48cmVjdCB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHJ4PSI2IiBmaWxsPSIjMDIwNjE3Ii8+PHBhdGggZD0iTTcgMjJWMTBoM2w1IDdWMTBoM3YxMmgtM2wtNS03djdIN3oiIGZpbGw9IiNGOEZBRkMiLz48cGF0aCBkPSJNMjEgMTBoOHYzaC0yLjV2OWgtM3YtOUgyMXYtM3oiIGZpbGw9IiNGNDNGNUUiLz48L3N2Zz4=" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }, colors: { obsidian: '#020617', rose_accent: '#F43F5E' } } } }
    </script>
    <style>
        body { background-color: #020617; color: #F8FAFC; }
        .glass-header { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="pt-32">
    <nav class="fixed top-0 w-full z-[100] glass-header">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter">NTRIX <span class="text-rose_accent">TECH</span></a>
            <div class="hidden lg:flex items-center space-x-10 text-[11px] font-black uppercase tracking-[0.2em]">
                <a href="expertise.html" class="hover:text-rose_accent transition-colors">Expertise</a>
                <a href="solutions.html" class="hover:text-rose_accent transition-colors">Solutions</a>
                <a href="success.html" class="text-rose_accent">Success</a>
                <a href="about.html" class="hover:text-rose_accent transition-colors">About</a>
                <a href="contact.html" class="bg-rose_accent px-6 py-3 rounded-full text-white">Get Started</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-20">
        <h1 class="text-7xl md:text-8xl font-black mb-10 leading-[0.9] reveal">Real Impact. <br> <span class="text-rose_accent">Real Results.</span></h1>
    </main>
    <script>
        lucide.createIcons();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
